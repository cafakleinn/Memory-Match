<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Scores</title>
    <link rel="stylesheet" href="../css/memory_match.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>

    <!-- Same navbar as game page: brand, burger (mobile), Play Game + High Scores -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="memory_match.html">
                <h1 class="title">Memory Match</h1>
            </a>
            <a class="navbar-burger burger" role="button" aria-label="menu" aria-expanded="false"
                data-target="navbarBasicExample">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>
        <div id="navbarBasicExample" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item" href="memory_match.html">Play Game</a>
                <a class="navbar-item" href="high_scores.html">High Scores</a>
            </div>
        </div>
    </nav>

    <main class="section container">
        <h1 class="title">High Scores</h1>

        <!-- Table: header is static; tbody rows are added by high_scores.js -->
        <table id="scores-table" class="table is-bordered is-striped">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Moves</th>
                    <th>Time (s)</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="scores-body">
                <!-- Rows populated by high_scores.js -->
            </tbody>
        </table>
    </main>

    <!-- Mobile: toggle navbar when burger is clicked -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var burger = document.querySelector('.navbar-burger');
            var menu = document.getElementById('navbarBasicExample');
            if (burger && menu) {
                burger.addEventListener('click', function () {
                    burger.classList.toggle('is-active');
                    menu.classList.toggle('is-active');
                });
            }
        });
    </script>
    <script src="../js/high_scores.js"></script>
</body>
</html>
